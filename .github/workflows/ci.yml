name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Swift Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.2"

      - name: Swift Version
        run: swift --version

      - name: Run Unit Tests
        run: swift test --parallel

  package:
    name: Package macOS App
    runs-on: macos-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1.2"

      - name: Build App Bundle And Zip
        run: ./scripts/package-macos-app.sh

      - name: Verify App Launch
        run: |
          APP_BIN="dist/Swooshy.app/Contents/MacOS/Swooshy"
          "$APP_BIN" >/tmp/app_out.log 2>&1 &
          PID=$!
          sleep 3
          if kill -0 "$PID" 2>/dev/null; then
            echo "App is running successfully in background."
            kill -9 "$PID" || true
          else
            echo "App crashed on launch. Logs:"
            cat /tmp/app_out.log
            exit 1
          fi

      - name: Upload Packaging Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Swooshy-macOS
          path: |
            dist/Swooshy.app
            dist/Swooshy-macOS.zip
          if-no-files-found: error
          retention-days: 14
